name: Sync blog posts and layout

on:
  push:
  workflow_dispatch: # allow manual runs

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog posts
        run: node scripts/generate-blog.js

      - name: Sync sidebar to all pages
        run: node scripts/sync-layout.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ friends/ cool-stuff/ guestbook/ not_found.html
          git diff --cached --quiet || git commit -m "synced blog posts and layout"
          git push
